<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condicional</title>
</head>
<body>
    <script>
        let num = parseInt (prompt("Digite um numero para saber se ele é par ou impar"))
        document.write("Número digitado: "+(num))
        if(num%2 == 0)
        {
            document.write("<br> PAR")
            for(i=0; i<=num; i++)
            {
                if(i%2 == 0)
                {
                    document.write("<br> "+(i))
                }
            }
        }
        else
        {
            document.write("<br> IMPAR")
            for(i=0; i<=num; i++)
            {
                if(i%2 != 0)
                {
                    document.write("<br> "+(i))
                }
            }
        }

    </script>
</body>
</html>
<!-- 
Desenvolva um script que receba um número como parâmetro e verifique se ele é par ou ímpar. Escreva na tela.

E escreva todos os antecessores

ex usuário digita 5

Saida

1  3  5

 Use a ajuda para conhecer todos os operadores do JS -->
