<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tabuada</h1>
  <input type="number" id="num" min="1" max="10" placeholder="1 a 10">
  <button onclick="tabuada()">calcular</button>
  <div id="res"></div>
  <script>
    function tabuada() {
      let n = parseInt(document.getElementById('num').value);
      let r = document.getElementById('res');
      r.innerHTML = '';
      if (n < 1 || n > 10 || isNaN(n)) {
        r.innerHTML = 'insira um numero de 1 a 10.';
        return;
      }
      for (let i = 0; i <= 10; i++) {
        r.innerHTML += `<b>${i}:</b><br>`;
        for (let j = 1; j <= n; j++) {
          r.innerHTML += `${i} x ${j} = ${i*j}<br>`;
        }
        r.innerHTML += '<br>';
      }
    }
    </script>
</body>
</html>
