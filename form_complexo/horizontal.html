<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu horizontal</title>
    <style>
        .menu li{
            list-style-type: none;
        }
        .menu ul{
            margin: 5px;
            display: none;
            position: absolute;
        }
        .menu li{
            padding: 10px;
            width: 100px;
            background-color: gainsboro;
            float: left;   
        }
        .menu > li:first-child{
            border-bottom-left-radius: 5px;
            border-top-left-radius: 5px;
        }
        .menu > li:last-child{
            border-bottom-right-radius: 5px;
            border-top-right-radius: 5px;
        }

        .menu li:hover > ul{
            display: block;
            margin-top: 5px;  
        }
        .menu li:hover{
            background-color: gray;
            cursor: grab;    
        }
        .subMenu li{
            background-color: gray;
            float: none;
            border-width: 2px;
            border-color: black;
            border-right-style: inset; 
        }
        .subMenu > li:first-child{
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        .subMenu > li:last-child{
            border-bottom-right-radius: 5px;
            border-bottom-left-radius: 5px;
        }
        .subMenu li:hover{
            background-color: rgb(90, 90, 90);
        }
        .subsubMenu li{
            background-color: rgb(90, 90, 90);
            border-width: 2px;
            border-color: rgb(158, 158, 158);
            border-right-style: inset;
        }
        .subsubMenu > li:first-child{
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        .subsubMenu > li:last-child{
            border-bottom-right-radius: 5px;
            border-bottom-left-radius: 5px;
        }
        .subsubMenu li:hover{
            background-color: rgb(48, 47, 47);
        }
    </style>
</head>
<body>
    <ul class="menu">
        <li>Menu 1</li>
        <li>Menu 2
            <ul class="subMenu">
                <li>Sub Menu 1</li>
                <li>Sub Menu 2</li>
                <li>Sub Menu 3
                    <ul class="subsubMenu">
                        <li>Sub sub Menu 4</li>
                        <li>Sub sub Menu 5</li>
                        <li>Sub sub Menu 6</li>
                    </ul>
                </li>
            </ul>
        </li>
        <li>Menu 3</li>
        <li>Menu 4</li>
        <li>Menu 5</li>
    </ul>
</body>
</html>
