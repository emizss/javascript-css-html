<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    function fatorial(n) {
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
    }

    while (true) {
        let entrada = prompt("Digite um inteiro positivo:");
            if (!entrada || entrada <= 0 || entrada % 1 !== 0) {
            alert("Valor inválido.");
            continue;
            }
            alert("Fatorial de " + entrada + " é " + fatorial(Number(entrada)));
            if (!confirm("Calcular outro?")) break;
    }
</script>
</body>
</html>
