<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu horizontal</title>
    <style>
        .menu ul{
            display: none;
            border-radius: 5px;
        }
        .menu li{
            display: inline-flex;
            list-style-type: none;
            padding: 10px;
            background-color: rgb(190, 190, 190);
            width: 100px;
            border-radius: 5px;
        }
        .menu li li{
            padding: 10px;
            margin: 5px;
            background-color: rgb(190, 190, 190);
            width: 90px;
            border-radius: 5px;
        }
        .menu li li li{
            padding: 10px;
            margin: 5px;
            background-color: rgb(190, 190, 190);
            width: 80px;
            border-radius: 5px;
        }
        .subMenu li:hover > ul{
            display: inline-flex;
           margin-left: 10px;
            margin-bottom: 1px;
        }
       
    </style>
</head>
<body>
    <ul class="menu">
        <li>Menu 1</li>
        <li>Menu 2
            <ul class="subMenu">
                <li>submenu 1</li>
                <li>submenu 2</li>
                <li>submenu 3
                    <ul>
                        <li>submenu 4</li>
                        <li>submenu 5</li>
                        <li>submenu 6</li>
                    </ul>
                </li>
            </ul>
        </li>
        <li>Menu 3</li>
        <li>Menu 4</li>
        <li>Menu 5</li>
    </ul>
</body>
</html>
